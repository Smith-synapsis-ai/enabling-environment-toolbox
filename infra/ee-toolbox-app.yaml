AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  EE Toolbox - Application stack (B2).
  EC2 Auto Scaling Group behind an ALB running the backend Docker container.
  Replaces the previous ECS Fargate + RDS architecture. SQLite state is
  replicated to S3 via Litestream; retrieval artifacts are loaded from S3
  at container start.

# =============================================================================
# Parameters
# =============================================================================
Parameters:
  Environment:
    Type: String
    AllowedValues: [mgmt, dev, tst, prd]
    Default: mgmt
    Description: Deployment environment

  VpcId:
    Type: String
    Default: vpc-024b5db1d38ced3a7
    Description: VPC for all resources

  SubnetIds:
    Type: CommaDelimitedList
    Default: "subnet-04fab9f22fe889781,subnet-0e77bf3abe86ca9db,subnet-04e0659a8cfefb1b5"
    Description: Public subnets across AZs

  CertificateArn:
    Type: String
    Default: ""
    Description: >-
      ACM certificate ARN for the HTTPS listener.
      Must be in the same AWS account as the ALB.
      Leave empty to skip the HTTPS listener (HTTP only — for testing only).

  ImageUri:
    Type: String
    Description: Full Docker image URI to run (ECR repo + tag)

  EERetrievalS3:
    Type: String
    Default: "s3://ee-toolbox-retrieval-207258148366"
    Description: S3 base URI for retrieval artifacts (evidence corpus, embeddings)

# =============================================================================
# Conditions
# =============================================================================
Conditions:
  # HTTPS listener is only created when a valid ACM cert ARN is supplied.
  # The deploy workflow always ensures a cert exists before deploying; this
  # condition lets the template be deployed manually (HTTP only) for testing.
  HasCert: !Not [!Equals [!Ref CertificateArn, ""]]

# =============================================================================
# Resources
# =============================================================================
Resources:

  # ---------------------------------------------------------------------------
  # Secrets Manager - API Keys
  # NOTE: ApiKeysSecret intentionally omitted from this template.
  # The secret (friendly name "ee-toolbox-api-keys") is created idempotently
  # by the deploy workflow (ensure-api-keys-secret step) before this stack is
  # deployed.  Its VALUE is managed out-of-band by the deploy-infra.yml workflow
  # via secretsmanager:put-secret-value.
  #
  # Managing it inside CloudFormation caused repeated CREATE_FAILED /
  # ROLLBACK_COMPLETE cycles: DeletionPolicy: Retain keeps the secret alive
  # through stack deletions, but CloudFormation always issues a CREATE on a
  # fresh stack — which fails when the secret already exists.
  # EC2InstanceRole and UserData already reference it by its well-known name
  # "ee-toolbox-api-keys" (via !Sub ARN and hardcoded env var), so nothing
  # here depends on the CF resource.
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # CloudWatch Log Group (kept from previous stack; container logs are also
  # available on-instance via `docker logs ee-toolbox-backend`)
  # ---------------------------------------------------------------------------
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/ee-toolbox-backend
      RetentionInDays: 14

  # ---------------------------------------------------------------------------
  # NOTE: LitestreamS3Bucket intentionally omitted from this template.
  # The bucket (ee-toolbox-sessions-<AccountId>) is created idempotently by
  # the deploy workflow (ensure-litestream-bucket step) before this stack is
  # deployed.  Managing it inside CloudFormation caused repeated
  # CREATE_FAILED / ROLLBACK_COMPLETE cycles: DeletionPolicy: Retain keeps the
  # bucket alive through stack deletions, but CloudFormation always issues a
  # CREATE on a fresh stack — which fails when the bucket already exists.
  # All EC2InstanceRole and UserData references use !Sub to build the bucket
  # name directly, so nothing here depends on the CF resource.
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # Security Group - ALB
  # ---------------------------------------------------------------------------
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: ee-toolbox-alb-sg
      GroupDescription: Security group for EE Toolbox ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS from anywhere
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP from anywhere (will redirect to HTTPS)
      Tags:
        - Key: Name
          Value: ee-toolbox-alb-sg
        - Key: Project
          Value: ee-toolbox

  # Explicit egress rule ALB -> EC2 instances on 8099 (separate resource to
  # avoid a circular dependency between the two security groups).
  ALBEgressToEC2:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !GetAtt ALBSecurityGroup.GroupId
      IpProtocol: tcp
      FromPort: 8099
      ToPort: 8099
      DestinationSecurityGroupId: !GetAtt EC2SecurityGroup.GroupId
      Description: Traffic and health checks to backend instances

  # ---------------------------------------------------------------------------
  # Security Group - EC2 instances
  # ---------------------------------------------------------------------------
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: ee-toolbox-ec2-sg
      GroupDescription: EE Toolbox EC2 instances
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8099
          ToPort: 8099
          SourceSecurityGroupId: !GetAtt ALBSecurityGroup.GroupId
          Description: Traffic from ALB only
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS (ECR, S3, Secrets Manager, Anthropic/OpenAI APIs)
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP (package repos)
      Tags:
        - Key: Name
          Value: ee-toolbox-ec2-sg
        - Key: Project
          Value: ee-toolbox

  # ---------------------------------------------------------------------------
  # IAM - EC2 Instance Role + Profile
  # ---------------------------------------------------------------------------
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: EEToolboxEC2Policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Secrets Manager - read API keys
              - Sid: SecretsManagerRead
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:eu-central-1:${AWS::AccountId}:secret:ee-toolbox-api-keys-*"
              # ECR - pull images
              - Sid: ECRRead
                Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: "*"
              - Sid: ECRPull
                Effect: Allow
                Action:
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchCheckLayerAvailability
                # Repo name is env-prefixed (e.g. ee-toolbox-prd-backend) to
                # match what the deploy workflow creates.
                Resource: !Sub "arn:aws:ecr:eu-central-1:${AWS::AccountId}:repository/ee-toolbox-${Environment}-backend"
              # S3 - Litestream replication (sessions bucket)
              - Sid: LitestreamS3
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::ee-toolbox-sessions-${AWS::AccountId}"
                  - !Sub "arn:aws:s3:::ee-toolbox-sessions-${AWS::AccountId}/*"
              # S3 - read retrieval artifacts (retrieval bucket in ai-prod)
              - Sid: RetrievalS3Read
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - "arn:aws:s3:::ee-toolbox-retrieval-207258148366"
                  - "arn:aws:s3:::ee-toolbox-retrieval-207258148366/*"
              # CloudWatch Logs
              - Sid: CloudWatchLogs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource: !Sub "arn:aws:logs:eu-central-1:${AWS::AccountId}:log-group:/ee-toolbox/*"
      Tags:
        - Key: Project
          Value: ee-toolbox

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  # ---------------------------------------------------------------------------
  # Launch Template
  # AMI: al2023-ami-2023.12.20260608.0-kernel-6.1-x86_64 (eu-central-1)
  # IMDS hop limit is set to 2 so the Docker container (bridge network) can
  # reach instance metadata for IAM credentials (boto3 + Litestream).
  # ---------------------------------------------------------------------------
  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub "ee-toolbox-${Environment}"
      LaunchTemplateData:
        ImageId: ami-0c8ab82f51d47e1be
        InstanceType: r6i.large
        IamInstanceProfile:
          Arn: !GetAtt EC2InstanceProfile.Arn
        SecurityGroupIds:
          - !GetAtt EC2SecurityGroup.GroupId
        MetadataOptions:
          HttpTokens: required
          HttpPutResponseHopLimit: 2
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: 30
              VolumeType: gp3
              DeleteOnTermination: true
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            # NOTE: No set -euo pipefail here.
            # cloud-init marks the scripts-user module FAILED on any non-zero
            # exit, which prevents the Docker container from ever starting.
            # Instead we use explicit error checks and retry loops.
            exec > /var/log/ee-toolbox-userdata.log 2>&1

            log() { echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] $*"; }

            log "=== EE Toolbox userdata starting ==="

            # Install Docker (awscli v2 is preinstalled on AL2023).
            # Retry up to 4 times to handle transient RPM-DB lock contention
            # (cloud-init's own package phase may hold the lock on first boot).
            for attempt in 1 2 3 4; do
              log "dnf install docker - attempt $attempt"
              dnf install -y docker && break
              log "dnf install failed (attempt $attempt), sleeping 20s ..."
              sleep 20
            done

            if ! command -v docker &>/dev/null; then
              log "FATAL: docker not installed after 4 attempts - aborting"
              exit 1
            fi

            log "Docker installed, enabling service"
            systemctl enable --now docker
            usermod -aG docker ec2-user

            # ECR login
            log "ECR login"
            aws ecr get-login-password --region ${AWS::Region} | \
              docker login --username AWS --password-stdin \
              ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com

            # Pull image
            log "Pulling image ${ImageUri}"
            docker pull ${ImageUri}

            mkdir -p /var/log/ee-toolbox

            # Run container
            log "Starting container"
            docker run -d \
              --name ee-toolbox-backend \
              --restart unless-stopped \
              -p 8099:8099 \
              -e EE_RETRIEVAL_S3=${EERetrievalS3} \
              -e EE_SECRET_NAME=ee-toolbox-api-keys \
              -e LITESTREAM_S3_PATH=s3://ee-toolbox-sessions-${AWS::AccountId}/agent_store \
              -e THUMBNAILS_BUCKET=ee-toolbox-thumbnails-${AWS::AccountId} \
              -e AWS_DEFAULT_REGION=${AWS::Region} \
              -v /var/log/ee-toolbox:/var/log/ee-toolbox \
              ${ImageUri}

            log "=== Container started successfully ==="
            echo "Container started at $(date -u)" >> /var/log/ee-toolbox-startup.log
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub "ee-toolbox-${Environment}"
              - Key: Environment
                Value: !Ref Environment
              - Key: Project
                Value: ee-toolbox

  # ---------------------------------------------------------------------------
  # Auto Scaling Group
  # ---------------------------------------------------------------------------
  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    DependsOn:
      # HTTPSListener is conditional (HasCert); do NOT list it here.
      # Depending on HTTPListener is sufficient: it ensures the ALB + TG are
      # wired up before instances register.
      - HTTPListener
    Properties:
      AutoScalingGroupName: !Sub "ee-toolbox-${Environment}"
      MinSize: "1"
      MaxSize: "3"
      DesiredCapacity: "1"
      HealthCheckType: ELB
      HealthCheckGracePeriod: 1200
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      TargetGroupARNs:
        - !Ref TargetGroup
      VPCZoneIdentifier: !Ref SubnetIds
      Tags:
        - Key: Name
          Value: !Sub "ee-toolbox-${Environment}"
          PropagateAtLaunch: true

  # ---------------------------------------------------------------------------
  # Scaling Policy - CPU target tracking
  # ---------------------------------------------------------------------------
  ScalingPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      PolicyType: TargetTrackingScaling
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ASGAverageCPUUtilization
        TargetValue: 70.0

  # ---------------------------------------------------------------------------
  # Application Load Balancer
  # ---------------------------------------------------------------------------
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: ee-toolbox-alb
      Scheme: internet-facing
      Type: application
      Subnets: !Ref SubnetIds
      SecurityGroups:
        - !GetAtt ALBSecurityGroup.GroupId
      LoadBalancerAttributes:
        - Key: idle_timeout.timeout_seconds
          Value: "3600"
      Tags:
        - Key: Project
          Value: ee-toolbox

  # ---------------------------------------------------------------------------
  # Target Group (instance targets, sticky sessions for SSE/agent state)
  # NOTE: no explicit Name. Changing TargetType (ip -> instance) is an
  # immutable-property update that forces replacement, and CloudFormation
  # creates the new TG before deleting the old one — any fixed name collides
  # with the existing TG ("already exists", seen 2026-06-10 with
  # ee-toolbox-mgmt-tg). A CF-generated name lets the swap succeed.
  # ---------------------------------------------------------------------------
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Port: 8099
      Protocol: HTTP
      TargetType: instance
      VpcId: !Ref VpcId
      HealthCheckProtocol: HTTP
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 5
      Matcher:
        HttpCode: "200"
      TargetGroupAttributes:
        - Key: stickiness.enabled
          Value: "true"
        - Key: stickiness.type
          Value: lb_cookie
        - Key: stickiness.lb_cookie.duration_seconds
          Value: "86400"
      Tags:
        - Key: Project
          Value: ee-toolbox

  # ---------------------------------------------------------------------------
  # HTTPS Listener (443) — only created when a valid CertificateArn is given.
  # ---------------------------------------------------------------------------
  HTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCert
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ---------------------------------------------------------------------------
  # HTTP Listener (80) - redirect to HTTPS
  # ---------------------------------------------------------------------------
  HTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: "443"
            StatusCode: HTTP_301

# =============================================================================
# Outputs
# =============================================================================
Outputs:
  ALBDnsName:
    Description: ALB DNS name
    Value: !GetAtt ALB.DNSName
    Export:
      Name: ee-toolbox-ALBDnsName

  ALBCanonicalHostedZoneID:
    Description: ALB canonical hosted zone ID (needed for Route53 alias records)
    Value: !GetAtt ALB.CanonicalHostedZoneID
    Export:
      Name: ee-toolbox-ALBCanonicalHostedZoneID

  APIUrl:
    Description: Backend API URL
    Value: "https://api-ee-toolbox.synapsis-analytics.com"
    Export:
      Name: ee-toolbox-APIUrl

  ECRRepositoryUri:
    Description: ECR repository URI
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/ee-toolbox-backend"
    Export:
      Name: ee-toolbox-ECRRepositoryUri

  AutoScalingGroupName:
    Description: Backend Auto Scaling Group name
    Value: !Ref AutoScalingGroup
    Export:
      Name: ee-toolbox-AutoScalingGroupName

  LitestreamBucketName:
    Description: S3 bucket for Litestream session replication
    Value: !Sub "ee-toolbox-sessions-${AWS::AccountId}"
    Export:
      Name: ee-toolbox-LitestreamBucketName
