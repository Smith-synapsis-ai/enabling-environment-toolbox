AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  EE Toolbox - Frontend stack.
  Creates an AWS Amplify app with custom domain for the React SPA.

# =============================================================================
# Parameters
# =============================================================================
Parameters:
  Environment:
    Type: String
    AllowedValues: [mgmt, dev, tst, prd]
    Default: mgmt
    Description: Deployment environment

  APIUrl:
    Type: String
    Description: Backend API URL (e.g. https://api-ee-toolbox.synapsis-analytics.com)

# =============================================================================
# Mappings
# =============================================================================
Mappings:
  EnvironmentConfig:
    dev:
      SubdomainPrefix: dev-ee-toolbox
      FrontendDomain: dev-ee-toolbox.synapsis-analytics.com
    tst:
      SubdomainPrefix: tst-ee-toolbox
      FrontendDomain: tst-ee-toolbox.synapsis-analytics.com
    prd:
      SubdomainPrefix: ee-toolbox
      FrontendDomain: ee-toolbox.synapsis-analytics.com
    mgmt:
      SubdomainPrefix: ee-toolbox
      FrontendDomain: ee-toolbox.synapsis-analytics.com

# =============================================================================
# Conditions
# =============================================================================
Conditions:
  IsMgmt: !Equals [!Ref Environment, mgmt]

# =============================================================================
# Resources
# =============================================================================
Resources:

  # ---------------------------------------------------------------------------
  # Amplify App
  # ---------------------------------------------------------------------------
  AmplifyApp:
    Type: AWS::Amplify::App
    Properties:
      Name: !Sub 'ee-toolbox-${Environment}'
      Platform: WEB
      CustomRules:
        # Rewrite deep-link routes (no file extension) to index.html for SPA
        # routing. The regex </^[^.]+$/> matches paths WITHOUT a dot, so it
        # catches /assistant, /dashboard etc. but NOT /assets/bundle.abc123.js,
        # /favicon.svg, or any other static asset with an extension.
        - Source: "</^[^.]+$/>"
          Target: /index.html
          Status: "200"
      EnvironmentVariables:
        - Name: VITE_API_BASE_URL
          Value: !Ref APIUrl
      BuildSpec: |
        # NOTE: Amplify also picks up amplify.yml from the repo root when the app
        # is connected to GitHub. This BuildSpec is set here so CloudFormation does
        # not leave it unset on first deploy; it mirrors amplify.yml exactly so
        # future CF updates do not undo the repo-connected build configuration.
        version: 1
        frontend:
          phases:
            preBuild:
              commands:
                - cd "$(git rev-parse --show-toplevel)/frontend"
                - npm ci
            build:
              commands:
                - cd "$(git rev-parse --show-toplevel)/frontend"
                - npm run build
                - cd "$(git rev-parse --show-toplevel)"
          artifacts:
            baseDirectory: frontend/dist
            files:
              - '**/*'
          cache:
            paths:
              - frontend/node_modules/**/*
      Tags:
        - Key: Project
          Value: ee-toolbox
        - Key: Environment
          Value: !Ref Environment
        - Key: Team
          Value: enabling-environments
        - Key: CostCenter
          Value: CGIAR-EE
        - Key: ManagedBy
          Value: cloudformation
        - Key: Service
          Value: frontend

  # ---------------------------------------------------------------------------
  # Amplify Branch - main
  # ---------------------------------------------------------------------------
  AmplifyBranch:
    Type: AWS::Amplify::Branch
    Properties:
      AppId: !GetAtt AmplifyApp.AppId
      BranchName: main
      EnableAutoBuild: false
      Tags:
        - Key: Project
          Value: ee-toolbox
        - Key: Environment
          Value: !Ref Environment
        - Key: Team
          Value: enabling-environments
        - Key: CostCenter
          Value: CGIAR-EE
        - Key: ManagedBy
          Value: cloudformation
        - Key: Service
          Value: frontend

  # ---------------------------------------------------------------------------
  # Amplify Domain - custom subdomain
  # ---------------------------------------------------------------------------
  AmplifyDomain:
    Type: AWS::Amplify::Domain
    Condition: IsMgmt
    DependsOn: AmplifyBranch
    Properties:
      AppId: !GetAtt AmplifyApp.AppId
      DomainName: synapsis-analytics.com
      SubDomainSettings:
        - BranchName: main
          Prefix: !FindInMap [EnvironmentConfig, !Ref Environment, SubdomainPrefix]

# =============================================================================
# Outputs
# =============================================================================
Outputs:
  AmplifyAppId:
    Description: Amplify application ID
    Value: !GetAtt AmplifyApp.AppId
    Export:
      Name: !Sub 'ee-toolbox-${Environment}-AmplifyAppId'

  AmplifyDefaultDomain:
    Description: Amplify default domain
    Value: !GetAtt AmplifyApp.DefaultDomain
    Export:
      Name: !Sub 'ee-toolbox-${Environment}-AmplifyDefaultDomain'

  FrontendUrl:
    Description: Frontend URL (custom domain)
    Value: !Sub
      - 'https://${FrontendDomain}'
      - FrontendDomain: !FindInMap [EnvironmentConfig, !Ref Environment, FrontendDomain]
    Export:
      Name: !Sub 'ee-toolbox-${Environment}-FrontendUrl'
