name: "Ops: Fix ASG Grace Period (B2)"

# One-off workflow to update the HealthCheckGracePeriod on the production
# ASG (ee-toolbox-prd) from 600s to 1200s.
#
# The boot sequence (dnf install docker + docker pull + S3 artifact load +
# embedding model download) takes 12-18 minutes on fresh AL2023 instances.
# With a 600s grace period, ELB health check failures trigger instance
# replacement before the container is ready, creating a crash-replace loop.
# 1200s gives sufficient runway for the full entrypoint.sh to complete.

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  fix-grace-period:
    name: Update ASG health check grace period
    runs-on: ubuntu-latest
    environment: prd
    env:
      AWS_REGION: eu-central-1
      ASG_NAME: ee-toolbox-prd

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ASG health check grace period to 1200s
        run: |
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name "$ASG_NAME" \
            --health-check-grace-period 1200 \
            --region "$AWS_REGION"
          echo "ASG grace period updated."

      - name: Verify updated grace period
        run: |
          GRACE=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "$ASG_NAME" \
            --region "$AWS_REGION" \
            --query 'AutoScalingGroups[0].HealthCheckGracePeriod' \
            --output text)
          echo "ASG HealthCheckGracePeriod: $GRACE seconds"
          if [ "$GRACE" -ge 1200 ]; then
            echo "Grace period successfully updated to $GRACE seconds."
          else
            echo "ERROR: Grace period is $GRACE, expected >= 1200"
            exit 1
          fi

      - name: Show current instance state
        run: |
          echo "=== Current ASG instances ==="
          aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "$ASG_NAME" \
            --region "$AWS_REGION" \
            --query 'AutoScalingGroups[0].Instances[].{ID:InstanceId,State:LifecycleState,Health:HealthStatus,LaunchTime:LaunchTime}' \
            --output table
          echo "=== Target group health ==="
          TG_ARN=$(aws elbv2 describe-target-groups \
            --region "$AWS_REGION" \
            --query 'TargetGroups[?contains(TargetGroupName, `ee-too`)].TargetGroupArn' \
            --output text)
          aws elbv2 describe-target-health \
            --target-group-arn "$TG_ARN" \
            --region "$AWS_REGION" \
            --output json
