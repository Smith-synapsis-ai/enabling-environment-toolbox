name: Ops — Seed Test Draft (export verification)

# One-off: inserts a synthetic report draft into the SQLite agent store
# so that the PDF/DOCX export endpoints can be exercised without running
# the full LLM orchestrator.  Prints the session_id used so the caller
# can immediately hit: GET /api/assistant/sessions/{session_id}/draft/export?format=pdf

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [prd, dev]
        default: prd
      instance_id:
        description: 'EC2 instance ID (blank = auto-discover from ASG)'
        required: false
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1

jobs:
  seed-draft:
    name: Seed test draft on ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve instance ID
        id: instance
        run: |
          PROVIDED="${{ github.event.inputs.instance_id }}"
          ENV="${{ github.event.inputs.environment }}"
          if [ -n "$PROVIDED" ]; then
            INSTANCE_ID="$PROVIDED"
          else
            INSTANCE_ID=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names "ee-toolbox-${ENV}" \
              --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService'].InstanceId | [0]" \
              --output text)
          fi
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "ERROR: No InService instance found in ASG ee-toolbox-${ENV}"
            exit 1
          fi
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "Instance: $INSTANCE_ID"

      - name: Seed synthetic draft via SSM
        id: ssm-seed
        run: |
          INSTANCE_ID="${{ steps.instance.outputs.instance_id }}"

          python3 -c "
          import json, base64

          SESSION_ID = 'test-export-batch2-verify-001'

          py_script = '''
import sys, json, sqlite3, os, datetime

db_path = os.environ.get('AGENT_STORE_PATH', '/app/backend/data/agent_store.db')
print(f'DB: {db_path}')

if not os.path.exists(db_path):
    print('ERROR: agent_store.db not found')
    sys.exit(1)

session_id = 'test-export-batch2-verify-001'
draft = {
    'session_id': session_id,
    'schema_version': 1,
    'title': 'Kenya Smallholder Scaling Challenge — Batch 2 Export Test',
    'challenge_summary': 'Testing smallholder technology adoption barriers in Kenya.',
    'sections': [
        {
            'id': 'context',
            'heading': '1. Challenge Context',
            'body_md': '''Kenya has approximately 7 million smallholder farming households, the majority of which operate on less than 2 hectares. These households account for 60 percent of agricultural labor and produce over 75 percent of the country\\'s food supply. Despite significant investment in agricultural technology, adoption rates for productivity-enhancing inputs remain below 30 percent in most regions.''',
            'sources': ['10568-100095', '10568-100096']
        },
        {
            'id': 'barriers',
            'heading': '2. Key Scaling Barriers',
            'body_md': 'The primary barriers identified include: (1) limited access to finance and credit; (2) weak extension service networks; (3) poor rural road infrastructure; (4) limited awareness of available technologies.',
            'sources': ['10568-100097']
        },
        {
            'id': 'recommended_tools',
            'heading': '3. Recommended Enabling Environment Tools',
            'body_md': 'Based on the challenge profile, the following tools from the CGIAR Enabling Environment Toolbox are recommended for policy design and intervention planning.',
            'sources': []
        }
    ],
    'candidate_tools': [
        {'id': '10568-100095', 'title': 'Gender-Responsive Extension Guide', 'status': 'accepted'},
        {'id': '10568-100096', 'title': 'Smallholder Finance Access Assessment', 'status': 'accepted'},
        {'id': '10568-100097', 'title': 'Rural Infrastructure Policy Framework', 'status': 'candidate'},
    ],
    'revision': 2,
    'turn_count': 3,
    'updated_at': datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%S+00:00'),
    'changelog': [
        {'revision': 1, 'turn': 1, 'summary': 'Initial challenge analysis.'},
        {'revision': 2, 'turn': 2, 'summary': 'Tools refined, barriers expanded.'}
    ]
}
draft_json = json.dumps(draft, indent=2)

conn = sqlite3.connect(db_path)
conn.execute(
    \"\"\"INSERT OR REPLACE INTO report_drafts (session_id, draft_json, updated_at) VALUES (?, ?, ?)\"\"\",
    (session_id, draft_json, datetime.datetime.utcnow().isoformat())
)
conn.commit()
conn.close()
print(f'OK: draft saved. session_id={session_id}')
'''

          b64 = base64.b64encode(py_script.encode()).decode()
          cmd = ('python3 -c ' + chr(39) +
                 'import base64; exec(base64.b64decode(b' +
                 chr(34) + b64 + chr(34) +
                 ').decode())' + chr(39))
          payload = {
              'InstanceIds': ['$INSTANCE_ID'],
              'DocumentName': 'AWS-RunShellScript',
              'Parameters': {'commands': [cmd]}
          }
          with open('/tmp/ssm_seed.json', 'w') as f:
              json.dump(payload, f)
          print('Payload ready. session_id=$SESSION_ID')
          "

          CMD_ID=$(aws ssm send-command \
            --cli-input-json file:///tmp/ssm_seed.json \
            --query "Command.CommandId" --output text)
          echo "SSM command: $CMD_ID"
          echo "cmd_id=$CMD_ID" >> $GITHUB_OUTPUT
          echo "session_id=test-export-batch2-verify-001" >> $GITHUB_OUTPUT
          sleep 20

      - name: Show SSM result
        run: |
          INSTANCE_ID="${{ steps.instance.outputs.instance_id }}"
          CMD_ID="${{ steps.ssm-seed.outputs.cmd_id }}"
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'Status' --output text)
          echo "SSM status: $STATUS"
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'StandardOutputContent' --output text
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'StandardErrorContent' --output text || true

      - name: Test export endpoints
        run: |
          SESSION_ID="${{ steps.ssm-seed.outputs.session_id }}"
          ENV="${{ github.event.inputs.environment }}"
          if [ "$ENV" = "prd" ]; then
            BASE="https://api-ee-toolbox.synapsis-analytics.com"
          else
            BASE="https://dev-api-ee-toolbox.synapsis-analytics.com"
          fi

          echo "=== Testing PDF export ==="
          curl -sS -w "\nHTTP %{http_code} | Content-Length: %{size_download} bytes" \
            "$BASE/api/assistant/sessions/$SESSION_ID/draft/export?format=pdf" \
            -o /tmp/test-export.pdf
          echo ""
          ls -lh /tmp/test-export.pdf

          echo "=== Testing DOCX export ==="
          curl -sS -w "\nHTTP %{http_code} | Content-Length: %{size_download} bytes" \
            "$BASE/api/assistant/sessions/$SESSION_ID/draft/export?format=docx" \
            -o /tmp/test-export.docx
          echo ""
          ls -lh /tmp/test-export.docx

          echo "=== Sessions list after seed ==="
          curl -sS "$BASE/api/assistant/sessions"
