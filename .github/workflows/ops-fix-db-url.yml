name: Ops — Fix DATABASE_URL in API Keys Secret

# One-off fix: reads ee-toolbox-prd-db-credentials to get the DB password,
# constructs DATABASE_URL / DATABASE_URL_SYNC, and merges them into the
# ee-toolbox-api-keys secret alongside the existing ANTHROPIC/OPENAI keys.
#
# Root cause this fixes: entrypoint.sh exports DATABASE_URL="" when the key
# is absent from ee-toolbox-api-keys (empty string overrides pydantic default
# → SQLAlchemy ArgumentError at import → container crash loop → 502).

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [prd, dev]
        default: prd
      instance_id:
        description: 'EC2 instance ID (blank = auto-discover from ASG)'
        required: false
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  API_KEYS_SECRET: ee-toolbox-api-keys
  DB_CREDS_SECRET: ee-toolbox-prd-db-credentials
  DB_HOST: ee-toolbox-prd-db.cl6246422thq.eu-central-1.rds.amazonaws.com
  DB_PORT: "5432"
  DB_USER: eetoolbox
  DB_NAME: ee_toolbox

jobs:
  fix-db-url:
    name: Fix DATABASE_URL on ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Step 1: Read DB password + build DATABASE_URL ────────────────────
      - name: Build and write DATABASE_URL into api-keys secret
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Reading DB credentials from: $DB_CREDS_SECRET"
          DB_CREDS_JSON=$(aws secretsmanager get-secret-value \
            --secret-id "$DB_CREDS_SECRET" --region "$AWS_REGION" \
            --query 'SecretString' --output text)

          # Extract password — handle both {"password":"..."} and RDS-managed
          # {"username":"...","password":"...","host":"...","port":...,"dbname":"..."}
          DB_PASSWORD=$(echo "$DB_CREDS_JSON" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          # Try common key names
          pw = d.get('password') or d.get('Password') or d.get('PGPASSWORD') or d.get('db_password') or ''
          if not pw:
              print('ERROR: could not find password key in secret', file=sys.stderr)
              sys.exit(1)
          print(pw, end='')
          ")
          echo "DB password extracted (length: ${#DB_PASSWORD})"

          # Construct URL variants
          DATABASE_URL="postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}"
          DATABASE_URL_SYNC="postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}"

          echo "DATABASE_URL host check: $(echo $DATABASE_URL | python3 -c "import sys; u=sys.stdin.read().strip(); print(u.split('@')[1].split('/')[0] if '@' in u else 'parse-error')")"

          # Write combined secret (ANTHROPIC + OPENAI from GH env secrets, DB from RDS)
          PAYLOAD=$(python3 -c "
          import json, sys, os
          d = {
              'ANTHROPIC_API_KEY': os.environ['ANTHROPIC_API_KEY'],
              'OPENAI_API_KEY':    os.environ['OPENAI_API_KEY'],
              'DATABASE_URL':      os.environ['DATABASE_URL'],
              'DATABASE_URL_SYNC': os.environ['DATABASE_URL_SYNC'],
          }
          print(json.dumps(d))
          " DATABASE_URL="$DATABASE_URL" DATABASE_URL_SYNC="$DATABASE_URL_SYNC")

          echo "Writing updated secret to: $API_KEYS_SECRET"
          aws secretsmanager put-secret-value \
            --secret-id "$API_KEYS_SECRET" \
            --secret-string "$PAYLOAD" \
            --region "$AWS_REGION"
          echo "Secret updated."

          # Verify (redacted)
          aws secretsmanager get-secret-value \
            --secret-id "$API_KEYS_SECRET" --region "$AWS_REGION" \
            --query 'SecretString' --output text \
          | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print('ANTHROPIC_API_KEY present:', bool(d.get('ANTHROPIC_API_KEY')))
          print('OPENAI_API_KEY present:   ', bool(d.get('OPENAI_API_KEY')))
          print('DATABASE_URL present:     ', bool(d.get('DATABASE_URL')))
          print('DATABASE_URL_SYNC present:', bool(d.get('DATABASE_URL_SYNC')))
          db = d.get('DATABASE_URL','')
          print('DATABASE_URL host:        ', db.split('@')[1].split('/')[0] if '@' in db else 'empty')
          "

      # ── Step 2: Restart the container so it picks up the updated secret ──
      - name: Resolve instance ID
        id: instance
        run: |
          PROVIDED="${{ github.event.inputs.instance_id }}"
          ENV="${{ github.event.inputs.environment }}"
          if [ -n "$PROVIDED" ]; then
            INSTANCE_ID="$PROVIDED"
            echo "Using provided instance: $INSTANCE_ID"
          else
            echo "Auto-discovering instance from ASG ee-toolbox-${ENV} ..."
            INSTANCE_ID=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names "ee-toolbox-${ENV}" \
              --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService'].InstanceId | [0]" \
              --output text)
            echo "Discovered: $INSTANCE_ID"
          fi
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "ERROR: No InService instance found in ASG ee-toolbox-${ENV}"
            exit 1
          fi
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Restart container via SSM
        id: ssm-restart
        run: |
          INSTANCE_ID="${{ steps.instance.outputs.instance_id }}"

          python3 -c "
          import json, base64

          container = 'ee-toolbox-backend'
          py_script = (
              'import subprocess, time\n'
              'print(\"=== Health BEFORE restart ===\")\n'
              'r = subprocess.run([\"curl\",\"-sf\",\"http://localhost:8099/health\"], capture_output=True, text=True)\n'
              'print(r.stdout or \"health-unreachable\")\n'
              'print(\"=== Container state BEFORE ===\")\n'
              'r2 = subprocess.run([\"docker\",\"inspect\",\"--format\",\"status={{.State.Status}} restarts={{.RestartCount}}\",\"' + container + '\"], capture_output=True, text=True)\n'
              'print(r2.stdout.strip() or r2.stderr.strip())\n'
              'print(\"=== Restarting container ' + container + ' ===\")\n'
              'r3 = subprocess.run([\"docker\",\"restart\",\"' + container + '\"], capture_output=True, text=True)\n'
              'print(\"docker restart rc:\", r3.returncode, r3.stdout.strip(), r3.stderr.strip())\n'
              'print(\"Waiting 45s for startup...\")\n'
              'time.sleep(45)\n'
              'print(\"=== Health AFTER restart ===\")\n'
              'r4 = subprocess.run([\"curl\",\"-sf\",\"http://localhost:8099/health\"], capture_output=True, text=True)\n'
              'print(r4.stdout or \"health-unreachable\")\n'
              'print(\"=== Container state AFTER ===\")\n'
              'r5 = subprocess.run([\"docker\",\"inspect\",\"--format\",\"status={{.State.Status}} restarts={{.RestartCount}}\",\"' + container + '\"], capture_output=True, text=True)\n'
              'print(r5.stdout.strip())\n'
          )
          b64 = base64.b64encode(py_script.encode()).decode()
          cmd = ('python3 -c ' + chr(39) +
                 'import base64; exec(base64.b64decode(b' +
                 chr(34) + b64 + chr(34) +
                 ').decode())' + chr(39))
          payload = {
              'InstanceIds': ['$INSTANCE_ID'],
              'DocumentName': 'AWS-RunShellScript',
              'Parameters': {'commands': [
                  'echo === SSM reached instance ===',
                  cmd,
              ]}
          }
          with open('/tmp/ssm_restart.json', 'w') as f:
              json.dump(payload, f, indent=2)
          print('Payload written.')
          "

          CMD_ID=$(aws ssm send-command \
            --cli-input-json file:///tmp/ssm_restart.json \
            --query "Command.CommandId" --output text)
          echo "SSM command ID: $CMD_ID"
          echo "cmd_id=$CMD_ID" >> $GITHUB_OUTPUT
          echo "Waiting 75s for restart and health check..."
          sleep 75

      - name: Show restart result
        run: |
          INSTANCE_ID="${{ steps.instance.outputs.instance_id }}"
          CMD_ID="${{ steps.ssm-restart.outputs.cmd_id }}"
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'Status' --output text)
          echo "SSM status: $STATUS"
          echo "--- stdout ---"
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'StandardOutputContent' --output text
          echo "--- stderr ---"
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'StandardErrorContent' --output text || true

      # ── Step 3: Final public health check ───────────────────────────────
      - name: Verify API health
        run: |
          ENV="${{ github.event.inputs.environment }}"
          if [ "$ENV" = "prd" ]; then
            HEALTH_URL="https://api-ee-toolbox.synapsis-analytics.com/health"
          else
            HEALTH_URL="https://dev-api-ee-toolbox.synapsis-analytics.com/health"
          fi
          echo "Checking $HEALTH_URL ..."
          for i in $(seq 1 16); do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$HEALTH_URL" 2>/dev/null || echo "000")
            BODY=$(curl -s --max-time 10 "$HEALTH_URL" 2>/dev/null || echo "")
            echo "[$i/16] HTTP $CODE  $BODY"
            if [ "$CODE" = "200" ]; then
              echo "API is healthy!"
              exit 0
            fi
            sleep 15
          done
          echo "WARNING: API did not return 200 within 4 minutes post-restart."
          exit 1
