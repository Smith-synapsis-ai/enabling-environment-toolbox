name: Ops — Restore API Keys Secret

# One-off workflow to repair production when the ee-toolbox-api-keys
# Secrets Manager secret is missing or empty (ResourceNotFoundException →
# entrypoint.sh exits at set -euo pipefail → ~8s crash loop).
#
# Steps:
#   1. Authenticate to the target account via OIDC deploy role
#   2. Create the secret if it doesn't exist (idempotent)
#   3. Populate/overwrite with the API keys from GitHub environment secrets
#   4. Restart the container via SSM so recovery is immediate rather than
#      waiting for the next Docker restart cycle

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [prd, dev]
        default: prd
      instance_id:
        description: 'EC2 instance ID (blank = auto-discover from ASG)'
        required: false
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  SECRET_NAME: ee-toolbox-api-keys

jobs:
  fix-secret:
    name: Restore API keys secret on ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Step 1: Create secret if missing ──────────────────────────────────
      - name: Ensure secret exists
        run: |
          echo "Checking for secret: $SECRET_NAME"
          if aws secretsmanager describe-secret --secret-id "$SECRET_NAME" \
               --region "$AWS_REGION" 2>/dev/null; then
            echo "Secret already exists — will overwrite values in next step."
          else
            echo "Secret not found — creating it now..."
            aws secretsmanager create-secret \
              --name "$SECRET_NAME" \
              --description "EE Toolbox API keys (Anthropic, OpenAI) - managed by deploy/ops workflows" \
              --secret-string '{"ANTHROPIC_API_KEY":"","OPENAI_API_KEY":""}' \
              --region "$AWS_REGION"
            echo "Secret created: $SECRET_NAME"
          fi

      # ── Step 2: Populate with real values ────────────────────────────────
      - name: Populate API key values
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Writing API key values to Secrets Manager: $SECRET_NAME"
          aws secretsmanager put-secret-value \
            --secret-id "$SECRET_NAME" \
            --secret-string "{\"ANTHROPIC_API_KEY\":\"${ANTHROPIC_API_KEY}\",\"OPENAI_API_KEY\":\"${OPENAI_API_KEY}\"}" \
            --region "$AWS_REGION"
          echo "Secret populated. Verifying keys present (redacted)..."
          aws secretsmanager get-secret-value \
            --secret-id "$SECRET_NAME" --region "$AWS_REGION" \
            --query 'SecretString' --output text \
          | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print('ANTHROPIC_API_KEY present:', bool(d.get('ANTHROPIC_API_KEY')))
          print('OPENAI_API_KEY present:', bool(d.get('OPENAI_API_KEY')))
          "

      # ── Step 3: Restart the container via SSM ────────────────────────────
      # The container crash-loops, so the secret fix will be picked up on the
      # next Docker restart. SSM restart makes recovery immediate.
      - name: Resolve instance ID
        id: instance
        run: |
          PROVIDED="${{ github.event.inputs.instance_id }}"
          ENV="${{ github.event.inputs.environment }}"
          if [ -n "$PROVIDED" ]; then
            INSTANCE_ID="$PROVIDED"
            echo "Using provided instance: $INSTANCE_ID"
          else
            echo "Auto-discovering instance from ASG ee-toolbox-${ENV} ..."
            INSTANCE_ID=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names "ee-toolbox-${ENV}" \
              --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService'].InstanceId | [0]" \
              --output text)
            echo "Discovered: $INSTANCE_ID"
          fi
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "ERROR: No InService instance found in ASG ee-toolbox-${ENV}"
            exit 1
          fi
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Restart container via SSM
        id: ssm-restart
        run: |
          INSTANCE_ID="${{ steps.instance.outputs.instance_id }}"

          # Use base64-encoded Python to avoid shell quoting issues (v3 SSM pattern)
          python3 -c "
          import json, base64

          container = 'ee-toolbox-backend'
          py_script = (
              'import subprocess, sys\n'
              'print(\"=== Health BEFORE restart ===\")\n'
              'r = subprocess.run([\"curl\",\"-sf\",\"http://localhost:8099/health\"], capture_output=True, text=True)\n'
              'print(r.stdout or \"health-unreachable\")\n'
              'print(\"=== Restarting container\", \"' + container + '\" + \" ===\")\n'
              'r2 = subprocess.run([\"docker\",\"restart\",\"' + container + '\"], capture_output=True, text=True)\n'
              'print(\"docker restart rc:\", r2.returncode, r2.stdout, r2.stderr)\n'
              'import time; time.sleep(30)\n'
              'print(\"=== Health AFTER restart ===\")\n'
              'r3 = subprocess.run([\"curl\",\"-sf\",\"http://localhost:8099/health\"], capture_output=True, text=True)\n'
              'print(r3.stdout or \"health-unreachable\")\n'
          )
          b64 = base64.b64encode(py_script.encode()).decode()
          cmd = ('python3 -c ' + chr(39) +
                 'import base64; exec(base64.b64decode(b' +
                 chr(34) + b64 + chr(34) +
                 ').decode())' + chr(39))
          payload = {
              'InstanceIds': ['$INSTANCE_ID'],
              'DocumentName': 'AWS-RunShellScript',
              'Parameters': {'commands': [
                  'echo === SSM reached instance ===',
                  cmd,
              ]}
          }
          with open('/tmp/ssm_restart.json', 'w') as f:
              json.dump(payload, f, indent=2)
          print('Payload written.')
          "

          CMD_ID=$(aws ssm send-command \
            --cli-input-json file:///tmp/ssm_restart.json \
            --query "Command.CommandId" --output text)
          echo "SSM command ID: $CMD_ID"
          echo "cmd_id=$CMD_ID" >> $GITHUB_OUTPUT
          echo "Waiting 60s for container to restart and become healthy..."
          sleep 60

      - name: Show restart result
        run: |
          INSTANCE_ID="${{ steps.instance.outputs.instance_id }}"
          CMD_ID="${{ steps.ssm-restart.outputs.cmd_id }}"
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'Status' --output text)
          echo "SSM command status: $STATUS"
          echo "--- stdout ---"
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'StandardOutputContent' --output text
          echo "--- stderr ---"
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'StandardErrorContent' --output text || true

      # ── Step 4: Final health check via public API ────────────────────────
      - name: Verify API health
        run: |
          ENV="${{ github.event.inputs.environment }}"
          if [ "$ENV" = "prd" ]; then
            HEALTH_URL="https://api-ee-toolbox.synapsis-analytics.com/health"
          else
            HEALTH_URL="https://dev-api-ee-toolbox.synapsis-analytics.com/health"
          fi
          echo "Checking $HEALTH_URL ..."
          for i in $(seq 1 12); do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$HEALTH_URL" 2>/dev/null || echo "000")
            BODY=$(curl -s --max-time 10 "$HEALTH_URL" 2>/dev/null || echo "")
            echo "[$i/12] HTTP $CODE  $BODY"
            if [ "$CODE" = "200" ]; then
              echo "API is healthy!"
              exit 0
            fi
            sleep 15
          done
          echo "WARNING: API did not return 200 within 3 minutes post-restart."
          exit 1
