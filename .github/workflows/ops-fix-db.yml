name: Ops — Fix DB Initializing (C12)

# One-off workflow to repair production when /health returns
# {"database":"initializing"} after an instance refresh or restart.
#
# Root cause: litestream restore fails silently (incomplete WAL in latest
# generation), leaving no SQLite file at /app/backend/data/agent_store.db.
# The litestream replicate daemon is already running inside the container
# but waiting for the file to appear. Creating an empty SQLite DB at that
# path is sufficient — litestream picks it up within seconds.
#
# Mechanism: SSM RunShellScript → docker exec into running container → Python
# sqlite3 creates an empty DB. Safe to re-run (no-op if file already exists).

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [prd, dev]
        default: prd
      instance_id:
        description: 'EC2 instance ID (blank = auto-discover from ASG)'
        required: false
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1

jobs:
  fix-db:
    name: Fix DB on ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve instance ID
        id: instance
        run: |
          PROVIDED="${{ github.event.inputs.instance_id }}"
          ENV="${{ github.event.inputs.environment }}"
          if [ -n "$PROVIDED" ]; then
            INSTANCE_ID="$PROVIDED"
            echo "Using provided instance: $INSTANCE_ID"
          else
            echo "Auto-discovering instance from ASG ee-toolbox-${ENV} ..."
            INSTANCE_ID=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names "ee-toolbox-${ENV}" \
              --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService'].InstanceId | [0]" \
              --output text)
            echo "Discovered instance: $INSTANCE_ID"
          fi
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "ERROR: No InService instance found in ASG ee-toolbox-${ENV}"
            exit 1
          fi
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Create SQLite file and verify health
        id: fix
        run: |
          INSTANCE_ID="${{ steps.instance.outputs.instance_id }}"
          ENV="${{ github.event.inputs.environment }}"

          # Build SSM payload as a JSON file using Python to avoid shell quoting issues.
          # The container name ee-toolbox-backend is set by the UserData docker run --name flag.
          python3 -c "
          import json, base64
          container = 'ee-toolbox-backend'
          py_script = (
              'import os, sqlite3\n'
              'db = \'/app/backend/data/agent_store.db\'\n'
              'os.makedirs(os.path.dirname(db), exist_ok=True)\n'
              'if os.path.exists(db):\n'
              '    print(\'already exists\')\n'
              'else:\n'
              '    c = sqlite3.connect(db)\n'
              '    c.execute(\'CREATE TABLE IF NOT EXISTS _init (id INTEGER PRIMARY KEY)\')\n'
              '    c.commit(); c.close()\n'
              '    print(\'created\')\n'
              'c2 = sqlite3.connect(db)\n'
              'c2.execute(\'SELECT 1\')\n'
              'c2.close()\n'
              'print(\'verify ok\')\n'
          )
          b64 = base64.b64encode(py_script.encode()).decode()
          cmd = ('docker exec ' + container + ' python3 -c ' +
                 chr(39) + 'import base64; exec(base64.b64decode(b' +
                 chr(34) + b64 + chr(34) +
                 ').decode())' + chr(39))
          commands = [
              'echo === Health BEFORE fix ===',
              'curl -sf http://localhost:8099/health || echo health-unreachable',
              'echo === Creating DB in container ' + container + ' ===',
              cmd,
              'sleep 3',
              'echo === Health AFTER fix ===',
              'curl -sf http://localhost:8099/health || echo health-unreachable',
          ]
          payload = {
              'InstanceIds': ['$INSTANCE_ID'],
              'DocumentName': 'AWS-RunShellScript',
              'Parameters': {'commands': commands}
          }
          with open('/tmp/ssm_fix.json', 'w') as f:
              json.dump(payload, f, indent=2)
          print('Payload written to /tmp/ssm_fix.json')
          "

          echo "=== SSM payload commands ==="
          python3 -c "import json; d=json.load(open('/tmp/ssm_fix.json')); [print(c) for c in d['Parameters']['commands']]"

          CMD_ID=$(aws ssm send-command \
            --cli-input-json file:///tmp/ssm_fix.json \
            --query "Command.CommandId" --output text)

          echo "SSM command ID: $CMD_ID"
          echo "cmd_id=$CMD_ID" >> $GITHUB_OUTPUT
          echo "Waiting 20s for command to complete ..."
          sleep 20

      - name: Show fix result
        run: |
          INSTANCE_ID="${{ steps.instance.outputs.instance_id }}"
          CMD_ID="${{ steps.fix.outputs.cmd_id }}"
          echo "=== SSM command result ==="
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'Status' --output text)
          echo "Status: $STATUS"
          if [ "$STATUS" != "Success" ]; then
            echo "ERROR: SSM command failed with status: $STATUS — see stderr below"
          fi
          echo "--- stdout ---"
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'StandardOutputContent' --output text
          echo "--- stderr ---"
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'StandardErrorContent' --output text || true
          if [ "$STATUS" != "Success" ]; then
            exit 1
          fi

      - name: Wait for canary then check alarms
        run: |
          echo "Waiting 90s for next canary invocation and alarm evaluation ..."
          sleep 90
          ENV="${{ github.event.inputs.environment }}"
          echo "=== CloudWatch alarms after DB fix ==="
          aws cloudwatch describe-alarms \
            --alarm-name-prefix "ee-toolbox-${ENV}" \
            --query 'MetricAlarms[*].{Name:AlarmName,State:StateValue,Updated:StateUpdatedTimestamp}' \
            --output table
