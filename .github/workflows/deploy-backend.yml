name: Deploy Backend (B2)

# ==============================================================================
# Builds the backend Docker image, pushes it to ECR (tags: <sha> and latest),
# then starts an instance refresh on the EC2 Auto Scaling Group so new
# instances pull the fresh "latest" image at boot.
#
# Note: the first run after a clean checkout may fail at the instance-refresh
# step if the ASG does not exist yet (deploy-infra.yml creates it).
# ==============================================================================

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "pipeline/**"
      - "Dockerfile"
      - ".dockerignore"
      - "litestream.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: mgmt
    env:
      AWS_REGION: eu-central-1
      ECR_REPOSITORY: ee-toolbox-backend
      ASG_NAME: ee-toolbox-mgmt
      # ── DB secret folding (prevents DATABASE_URL crash-loop on instance refresh) ──
      # This is the real prod backend deploy path: it runs in the GitHub `mgmt`
      # environment, whose deploy role lives in AWS account 919959486181 — the
      # SAME account as the ee-toolbox-mgmt ASG it refreshes and the
      # ee-toolbox-api-keys secret the running container reads (EE_SECRET_NAME).
      # The DB credentials in THIS account are ee-toolbox-mgmt-db-credentials
      # for the ee-toolbox-mgmt-db RDS instance (NOT ee-toolbox-prd-db-credentials,
      # which only exists in account 207258148366 / the prd GitHub environment).
      # The new instance MUST find DATABASE_URL in ee-toolbox-api-keys before it
      # boots, so we populate the secret immediately before the refresh using the
      # same logic as ops-fix-db-url.yml.
      API_KEYS_SECRET: ee-toolbox-api-keys
      DB_CREDS_SECRET: ee-toolbox-mgmt-db-credentials
      DB_HOST: ee-toolbox-mgmt-db.cr8b99ph4qzq.eu-central-1.rds.amazonaws.com
      DB_PORT: "5432"
      DB_USER: eetoolbox
      DB_NAME: ee_toolbox
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "Pushed $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG and :latest"

      # ── Populate DATABASE_URL into api-keys secret BEFORE instance refresh ──
      # The fresh instance reads ee-toolbox-api-keys at boot via entrypoint.sh.
      # If DATABASE_URL is absent, SQLAlchemy raises ArgumentError → crash-loop
      # → 502. This step reads ee-toolbox-prd-db-credentials, builds the DB URLs,
      # and merges them with the API keys (same logic as ops-fix-db-url.yml),
      # so no manual ops-fix is ever needed after a deploy.
      - name: Populate DATABASE_URL into api-keys secret
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Populating $API_KEYS_SECRET (API keys + DATABASE_URL) before instance refresh"

          DATABASE_URL=""
          DATABASE_URL_SYNC=""
          if aws secretsmanager describe-secret --secret-id "$DB_CREDS_SECRET" --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "Reading DB credentials from: $DB_CREDS_SECRET"
            DB_CREDS_JSON=$(aws secretsmanager get-secret-value \
              --secret-id "$DB_CREDS_SECRET" --region "$AWS_REGION" \
              --query 'SecretString' --output text)
            DB_PASSWORD=$(echo "$DB_CREDS_JSON" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          pw = d.get('password') or d.get('Password') or d.get('PGPASSWORD') or d.get('db_password') or ''
          if not pw:
              print('ERROR: could not find password key in secret', file=sys.stderr)
              sys.exit(1)
          print(pw, end='')
          ")
            echo "DB password extracted (length: ${#DB_PASSWORD})"
            DATABASE_URL="postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}"
            DATABASE_URL_SYNC="postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}"
            export DATABASE_URL DATABASE_URL_SYNC
            echo "DATABASE_URL host check: $(echo "$DATABASE_URL" | python3 -c "import sys; u=sys.stdin.read().strip(); print(u.split('@')[1].split('/')[0] if '@' in u else 'parse-error')")"
          else
            echo "DB credentials secret $DB_CREDS_SECRET not found — writing API keys only."
          fi

          export ANTHROPIC_API_KEY OPENAI_API_KEY
          PAYLOAD=$(python3 -c "
          import json, os
          d = {
              'ANTHROPIC_API_KEY': os.environ.get('ANTHROPIC_API_KEY', ''),
              'OPENAI_API_KEY':    os.environ.get('OPENAI_API_KEY', ''),
          }
          if os.environ.get('DATABASE_URL'):
              d['DATABASE_URL'] = os.environ['DATABASE_URL']
          if os.environ.get('DATABASE_URL_SYNC'):
              d['DATABASE_URL_SYNC'] = os.environ['DATABASE_URL_SYNC']
          print(json.dumps(d))
          ")

          echo "Writing combined secret to: $API_KEYS_SECRET"
          aws secretsmanager put-secret-value \
            --secret-id "$API_KEYS_SECRET" \
            --secret-string "$PAYLOAD" \
            --region "$AWS_REGION"

          aws secretsmanager get-secret-value \
            --secret-id "$API_KEYS_SECRET" --region "$AWS_REGION" \
            --query 'SecretString' --output text \
          | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print('ANTHROPIC_API_KEY present:', bool(d.get('ANTHROPIC_API_KEY')))
          print('OPENAI_API_KEY present:   ', bool(d.get('OPENAI_API_KEY')))
          print('DATABASE_URL present:     ', bool(d.get('DATABASE_URL')))
          print('DATABASE_URL_SYNC present:', bool(d.get('DATABASE_URL_SYNC')))
          "

      - name: Start ASG instance refresh
        run: |
          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "$ASG_NAME" \
            --preferences '{"MinHealthyPercentage":0,"InstanceWarmup":300}' \
            --region "$AWS_REGION" \
            --query 'InstanceRefreshId' --output text)
          echo "Instance refresh started: $REFRESH_ID"
          echo "REFRESH_ID=$REFRESH_ID" >> "$GITHUB_ENV"

      - name: Wait for instance refresh
        run: |
          for i in $(seq 1 40); do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "$ASG_NAME" \
              --instance-refresh-ids "$REFRESH_ID" \
              --region "$AWS_REGION" \
              --query 'InstanceRefreshes[0].Status' --output text)
            echo "[$i/40] Instance refresh status: $STATUS"
            case "$STATUS" in
              Successful)
                echo "Instance refresh completed successfully."
                exit 0
                ;;
              Failed|Cancelled)
                echo "Instance refresh ended with status: $STATUS"
                exit 1
                ;;
            esac
            sleep 30
          done
          echo "Instance refresh still in progress after 20 minutes; not failing the job."
          exit 0
