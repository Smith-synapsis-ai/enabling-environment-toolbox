name: Deploy Backend (B2)

# ==============================================================================
# Builds the backend Docker image, pushes it to ECR (tags: <sha> and latest),
# then starts an instance refresh on the EC2 Auto Scaling Group so new
# instances pull the fresh "latest" image at boot.
#
# Note: the first run after a clean checkout may fail at the instance-refresh
# step if the ASG does not exist yet (deploy-infra.yml creates it).
# ==============================================================================

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "pipeline/**"
      - "Dockerfile"
      - ".dockerignore"
      - "litestream.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: mgmt
    env:
      AWS_REGION: eu-central-1
      ECR_REPOSITORY: ee-toolbox-backend
      ASG_NAME: ee-toolbox-mgmt
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "Pushed $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG and :latest"

      - name: Start ASG instance refresh
        run: |
          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "$ASG_NAME" \
            --preferences '{"MinHealthyPercentage":0,"InstanceWarmup":300}' \
            --region "$AWS_REGION" \
            --query 'InstanceRefreshId' --output text)
          echo "Instance refresh started: $REFRESH_ID"
          echo "REFRESH_ID=$REFRESH_ID" >> "$GITHUB_ENV"

      - name: Wait for instance refresh
        run: |
          for i in $(seq 1 40); do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "$ASG_NAME" \
              --instance-refresh-ids "$REFRESH_ID" \
              --region "$AWS_REGION" \
              --query 'InstanceRefreshes[0].Status' --output text)
            echo "[$i/40] Instance refresh status: $STATUS"
            case "$STATUS" in
              Successful)
                echo "Instance refresh completed successfully."
                exit 0
                ;;
              Failed|Cancelled)
                echo "Instance refresh ended with status: $STATUS"
                exit 1
                ;;
            esac
            sleep 30
          done
          echo "Instance refresh still in progress after 20 minutes; not failing the job."
          exit 0
