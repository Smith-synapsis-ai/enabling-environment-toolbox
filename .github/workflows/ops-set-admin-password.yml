name: Ops — Set Admin Password (B1)

# One-off / on-demand workflow to inject a STRONG admin password into the
# ee-toolbox-api-keys Secrets Manager secret that the live backend reads, then
# restart the container via SSM so the new credential takes effect immediately
# (no full ASG instance refresh — minimizes disruption to Jose's live demo).
#
# Why this exists: the backend ships with NO usable admin-password default
# (config.py fails CLOSED), so the live admin surface is locked until a strong
# password lives in this secret. deploy.yml also folds the admin password into
# the secret on every backend deploy and REUSES an existing strong one, so the
# value set here is stable across future deploys.
#
# Usage: provide a strong password (>= 12 chars). It is merged into the secret
# WITHOUT clobbering ANTHROPIC_API_KEY / OPENAI_API_KEY / DATABASE_URL(_SYNC).

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (prd = live)'
        required: true
        type: choice
        options: [prd, dev]
        default: prd
      admin_password:
        description: 'New strong admin password (>= 12 chars)'
        required: true
        type: string
      admin_username:
        description: 'Admin username (default: admin)'
        required: false
        type: string
        default: admin
      instance_id:
        description: 'EC2 instance ID (blank = auto-discover from ASG)'
        required: false
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  SECRET_NAME: ee-toolbox-api-keys

jobs:
  set-admin-password:
    name: Set admin password on ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "Operating in account: $ACCOUNT_ID (environment: ${{ github.event.inputs.environment }})"

      # ── Merge admin credentials into the existing secret (non-clobbering) ───
      - name: Merge admin credentials into secret
        env:
          ADMIN_PASSWORD: ${{ github.event.inputs.admin_password }}
          ADMIN_USERNAME: ${{ github.event.inputs.admin_username }}
        run: |
          echo "::add-mask::$ADMIN_PASSWORD"
          if [ "${#ADMIN_PASSWORD}" -lt 12 ]; then
            echo "ERROR: admin_password must be at least 12 characters." >&2
            exit 1
          fi

          echo "Reading existing secret: $SECRET_NAME"
          EXISTING=$(aws secretsmanager get-secret-value \
            --secret-id "$SECRET_NAME" --region "$AWS_REGION" \
            --query 'SecretString' --output text 2>/dev/null || echo '{}')

          export ADMIN_PASSWORD ADMIN_USERNAME
          PAYLOAD=$(echo "$EXISTING" | python3 -c "
          import sys, json, os
          try:
              d = json.load(sys.stdin)
          except Exception:
              d = {}
          d['ADMIN_USERNAME'] = os.environ.get('ADMIN_USERNAME') or 'admin'
          d['ADMIN_PASSWORD'] = os.environ['ADMIN_PASSWORD']
          print(json.dumps(d))
          ")

          echo "Writing merged secret (preserving API keys + DB URLs)..."
          aws secretsmanager put-secret-value \
            --secret-id "$SECRET_NAME" \
            --secret-string "$PAYLOAD" \
            --region "$AWS_REGION"

          echo "Verifying (redacted)..."
          aws secretsmanager get-secret-value \
            --secret-id "$SECRET_NAME" --region "$AWS_REGION" \
            --query 'SecretString' --output text \
          | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          pw = d.get('ADMIN_PASSWORD','')
          print('ANTHROPIC_API_KEY present:', bool(d.get('ANTHROPIC_API_KEY')))
          print('OPENAI_API_KEY present:   ', bool(d.get('OPENAI_API_KEY')))
          print('DATABASE_URL present:     ', bool(d.get('DATABASE_URL')))
          print('DATABASE_URL_SYNC present:', bool(d.get('DATABASE_URL_SYNC')))
          print('ADMIN_USERNAME:           ', d.get('ADMIN_USERNAME',''))
          print('ADMIN_PASSWORD present:   ', bool(pw), '(strong)' if len(pw) >= 12 else '(WEAK!)')
          "

      # ── Resolve the live instance and restart the container (immediate) ─────
      - name: Resolve instance ID
        id: instance
        run: |
          PROVIDED="${{ github.event.inputs.instance_id }}"
          ENV="${{ github.event.inputs.environment }}"
          if [ -n "$PROVIDED" ]; then
            INSTANCE_ID="$PROVIDED"
          else
            echo "Auto-discovering instance from ASG ee-toolbox-${ENV} ..."
            INSTANCE_ID=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names "ee-toolbox-${ENV}" \
              --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService'].InstanceId | [0]" \
              --output text)
          fi
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "ERROR: No InService instance found in ASG ee-toolbox-${ENV}" >&2
            exit 1
          fi
          echo "Resolved instance: $INSTANCE_ID"
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Restart container via SSM
        id: ssm-restart
        run: |
          INSTANCE_ID="${{ steps.instance.outputs.instance_id }}"
          python3 -c "
          import json, base64
          container = 'ee-toolbox-backend'
          py_script = (
              'import subprocess, time\n'
              'print(\"=== Restarting\", \"' + container + '\" + \" to reload ADMIN_PASSWORD ===\")\n'
              'r = subprocess.run([\"docker\",\"restart\",\"' + container + '\"], capture_output=True, text=True)\n'
              'print(\"docker restart rc:\", r.returncode, r.stdout, r.stderr)\n'
              'time.sleep(30)\n'
              'r2 = subprocess.run([\"curl\",\"-sf\",\"http://localhost:8099/health\"], capture_output=True, text=True)\n'
              'print(\"health:\", r2.stdout or \"unreachable\")\n'
          )
          b64 = base64.b64encode(py_script.encode()).decode()
          cmd = ('python3 -c ' + chr(39) +
                 'import base64; exec(base64.b64decode(b' +
                 chr(34) + b64 + chr(34) +
                 ').decode())' + chr(39))
          payload = {
              'InstanceIds': ['$INSTANCE_ID'],
              'DocumentName': 'AWS-RunShellScript',
              'Parameters': {'commands': ['echo === SSM reached instance ===', cmd]}
          }
          with open('/tmp/ssm_restart.json', 'w') as f:
              json.dump(payload, f)
          "
          CMD_ID=$(aws ssm send-command \
            --cli-input-json file:///tmp/ssm_restart.json \
            --query "Command.CommandId" --output text)
          echo "SSM command ID: $CMD_ID"
          echo "cmd_id=$CMD_ID" >> $GITHUB_OUTPUT
          sleep 60

      - name: Show restart result
        run: |
          INSTANCE_ID="${{ steps.instance.outputs.instance_id }}"
          CMD_ID="${{ steps.ssm-restart.outputs.cmd_id }}"
          echo "SSM status: $(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query 'Status' --output text)"
          echo "--- stdout ---"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query 'StandardOutputContent' --output text || true
          echo "--- stderr ---"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query 'StandardErrorContent' --output text || true

      - name: Verify admin auth behaviour on live API
        run: |
          ENV="${{ github.event.inputs.environment }}"
          if [ "$ENV" = "prd" ]; then
            API="https://api-ee-toolbox.synapsis-analytics.com"
          else
            API="https://dev-api-ee-toolbox.synapsis-analytics.com"
          fi
          echo "Waiting for backend to come healthy, then testing admin login..."
          for i in $(seq 1 12); do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$API/health" 2>/dev/null || echo "000")
            echo "[$i/12] /health HTTP $CODE"
            [ "$CODE" = "200" ] && break
            sleep 15
          done
          echo "--- admin123 should now be REJECTED (expect 401/403) ---"
          curl -s -o /dev/null -w 'admin123 -> HTTP %{http_code}\n' \
            -X POST "$API/api/admin/login" \
            -H 'Content-Type: application/json' \
            -d '{"username":"admin","password":"admin123"}'
