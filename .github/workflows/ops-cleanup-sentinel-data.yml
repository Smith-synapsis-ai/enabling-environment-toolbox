name: Ops — Cleanup Sentinel/Test Data

# Runs backend/scripts/cleanup_sentinel_data.py against the LIVE durable Postgres
# store to remove ONLY clearly-labeled test/sentinel rows that skew the launch
# admin dashboard (token-usage cost, analytics counts_by_event, survey average,
# governance proposal queue).
#
# The script is committed and reviewable. It targets explicit sentinel markers
# and known QA-test session ids only — never a bulk wipe, and never the
# access_event KPI rows. It is executed INSIDE the running backend container via
# SSM (the container has DATABASE_URL + PYTHONPATH + the app code), so no manual
# ad-hoc DB edit is involved.
#
# Default is a DRY RUN (reports counts only). Set apply=true to delete.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (prd = live)'
        required: true
        type: choice
        options: [prd, dev]
        default: prd
      apply:
        description: 'Actually delete (false = dry run report only)'
        required: true
        type: choice
        options: ['false', 'true']
        default: 'false'
      instance_id:
        description: 'EC2 instance ID (blank = auto-discover from ASG)'
        required: false
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1

jobs:
  cleanup:
    name: Cleanup sentinel data on ${{ github.event.inputs.environment }} (apply=${{ github.event.inputs.apply }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS account
        run: aws sts get-caller-identity --query Account --output text

      - name: Resolve instance ID
        id: instance
        run: |
          PROVIDED="${{ github.event.inputs.instance_id }}"
          ENV="${{ github.event.inputs.environment }}"
          if [ -n "$PROVIDED" ]; then
            INSTANCE_ID="$PROVIDED"
          else
            INSTANCE_ID=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names "ee-toolbox-${ENV}" \
              --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService'].InstanceId | [0]" \
              --output text)
          fi
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "ERROR: No InService instance found in ASG ee-toolbox-${ENV}" >&2
            exit 1
          fi
          echo "Resolved instance: $INSTANCE_ID"
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Run cleanup script inside container via SSM
        id: ssm
        run: |
          INSTANCE_ID="${{ steps.instance.outputs.instance_id }}"
          APPLY="${{ github.event.inputs.apply }}"
          FLAG=""
          if [ "$APPLY" = "true" ]; then FLAG="--apply"; fi
          echo "apply=$APPLY -> flag='$FLAG'"

          # The committed script is baked into the running image at
          # /app/backend/scripts/cleanup_sentinel_data.py. We also ship the
          # host copy into the container (docker cp) as a belt-and-braces
          # fallback in case the running image predates the commit. All output
          # (stdout+stderr) is captured so the dashboard before/after counts and
          # the exact targeted rows appear in the workflow log.
          SCRIPT_B64=$(base64 < backend/scripts/cleanup_sentinel_data.py | tr -d '\n')

          python3 - "$INSTANCE_ID" "$FLAG" "$SCRIPT_B64" <<'PYEOF'
          import sys, json
          instance_id, flag, script_b64 = sys.argv[1], sys.argv[2], sys.argv[3]
          container = "ee-toolbox-backend"
          inner = (
              "echo '=== SSM reached instance ==='; "
              "echo '--- containers ---'; docker ps --format '{{.Names}} {{.Status}}'; "
              # Ship host copy in as a fallback path (won't fail the run if cp errors).
              f"echo '{script_b64}' | base64 -d > /tmp/cleanup_sentinel_data.py; "
              f"docker cp /tmp/cleanup_sentinel_data.py {container}:/tmp/cleanup_sentinel_data.py 2>&1 || echo 'docker cp failed (will try in-image path)'; "
              "echo '--- running cleanup script (stdout+stderr) ---'; "
              # Prefer the in-image path; fall back to the cp'd /tmp copy.
              f"docker exec -e PYTHONPATH=/app/backend:/app {container} sh -lc "
              f"'python3 /app/backend/scripts/cleanup_sentinel_data.py {flag} 2>&1 || "
              f"python3 /tmp/cleanup_sentinel_data.py {flag} 2>&1'; "
              "rc=$?; echo \"--- cleanup exit rc=$rc ---\"; exit $rc"
          )
          payload = {
              "InstanceIds": [instance_id],
              "DocumentName": "AWS-RunShellScript",
              "Parameters": {"commands": [inner]},
          }
          with open("/tmp/ssm_cleanup.json", "w") as f:
              json.dump(payload, f)
          print("payload written")
          PYEOF

          CMD_ID=$(aws ssm send-command \
            --cli-input-json file:///tmp/ssm_cleanup.json \
            --query "Command.CommandId" --output text)
          echo "SSM command ID: $CMD_ID"
          echo "cmd_id=$CMD_ID" >> $GITHUB_OUTPUT

          echo "Waiting for command to finish..."
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
              --query 'Status' --output text 2>/dev/null || echo "Pending")
            echo "[$i/30] status=$STATUS"
            case "$STATUS" in
              Success|Failed|Cancelled|TimedOut) break ;;
            esac
            sleep 10
          done

      - name: Show cleanup output
        run: |
          INSTANCE_ID="${{ steps.instance.outputs.instance_id }}"
          CMD_ID="${{ steps.ssm.outputs.cmd_id }}"
          STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query 'Status' --output text)
          echo "Final SSM status: $STATUS"
          echo "================= STDOUT ================="
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query 'StandardOutputContent' --output text
          echo "================= STDERR ================="
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query 'StandardErrorContent' --output text || true
          if [ "$STATUS" != "Success" ]; then
            echo "::error::Cleanup SSM command did not succeed (status=$STATUS)"
            exit 1
          fi
