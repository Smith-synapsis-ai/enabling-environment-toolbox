name: CI

# Runs on every PR and every push to main.
# This is the quality gate for Phase C — all code must pass before merging.
on:
  pull_request:
  push:
    branches: [main]

# Cancel stale PR runs when new commits are pushed; never cancel main.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test-backend:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Run pytest
        run: python -m pytest --tb=short -q
        # Smoke-DB tests (test_evidence_drilldown.py) skip automatically
        # when evidence_smoke.db is absent — no flag needed.

  build-frontend:
    name: Frontend build (tsc + vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (tsc -b && vite build)
        working-directory: frontend
        run: npm run build
        # npm run build = "tsc -b && vite build" — includes TypeScript type-check
