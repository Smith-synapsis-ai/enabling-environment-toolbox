name: "One-off: Trigger Amplify rebuild + cache invalidation"

# Triggers a RELEASE build on the Amplify app to force a CloudFront /*
# invalidation. Use this when assets are being served with wrong content-types
# due to stale cached responses from the old catch-all rewrite rule.
#
# After this job succeeds, the custom domain ee-toolbox.synapsis-analytics.com
# should serve JS/CSS with correct content-types.

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  AMPLIFY_APP_ID: d15pb16eb2gi8i
  AMPLIFY_BRANCH: main

jobs:
  rebuild:
    name: Trigger Amplify RELEASE build
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC → MGMT)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::919959486181:role/cicd/github-actions-enabling-environment-toolbox-MGMT-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Show current branch state
        run: |
          aws amplify get-branch \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$AMPLIFY_BRANCH" \
            --query 'branch.{branch:branchName,status:displayName,lastDeployTime:lastDeployTime,totalJobs:totalNumberOfJobs}' \
            --output json

      - name: Start RELEASE build
        id: start-build
        run: |
          JOB_ID=$(aws amplify start-job \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$AMPLIFY_BRANCH" \
            --job-type RELEASE \
            --query 'jobSummary.jobId' --output text)
          echo "Started RELEASE build: $JOB_ID"
          echo "JOB_ID=$JOB_ID" >> "$GITHUB_ENV"

      - name: Poll until build completes (max 20 minutes)
        run: |
          for i in $(seq 1 120); do
            STATUS=$(aws amplify get-job \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$AMPLIFY_BRANCH" \
              --job-id "$JOB_ID" \
              --query 'job.summary.status' --output text 2>/dev/null || echo "PENDING")
            echo "  Poll $i/120: $STATUS"
            if [ "$STATUS" = "SUCCEED" ]; then
              echo "✅ Build $JOB_ID succeeded — CloudFront cache has been invalidated."
              exit 0
            fi
            if [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "::error::Build $JOB_ID ended with status $STATUS"
              aws amplify get-job \
                --app-id "$AMPLIFY_APP_ID" \
                --branch-name "$AMPLIFY_BRANCH" \
                --job-id "$JOB_ID" \
                --query 'job.steps[].{step:stepName,status:status}' --output table || true
              exit 1
            fi
            sleep 10
          done
          echo "::error::Timed out waiting for build $JOB_ID after 20 minutes"
          exit 1

      - name: Verify asset content-type on custom domain
        run: |
          echo "Waiting 30s for CloudFront to propagate invalidation..."
          sleep 30
          # Find the current asset filename
          ASSET_URL=$(curl -s "https://ee-toolbox.synapsis-analytics.com/" \
            | grep -oP '(?<=src=")[^"]+\.js' | head -1 || echo "")
          if [ -z "$ASSET_URL" ]; then
            echo "Could not find JS asset URL from index page, using known path"
            ASSET_PATH="/assets/index-B5Ik3aC2.js"
          else
            ASSET_PATH="$ASSET_URL"
          fi
          echo "Testing: https://ee-toolbox.synapsis-analytics.com$ASSET_PATH"
          CONTENT_TYPE=$(curl -sI "https://ee-toolbox.synapsis-analytics.com$ASSET_PATH" \
            | grep -i 'content-type:' | head -1)
          echo "Content-Type: $CONTENT_TYPE"
          if echo "$CONTENT_TYPE" | grep -qi 'javascript\|application/'; then
            echo "✅ Assets now served with correct content-type"
          else
            echo "⚠️  Content-type may still be wrong: $CONTENT_TYPE"
            echo "CloudFront propagation may take a few more minutes."
          fi
