name: "One-off: Trigger Amplify rebuild + cache invalidation"

# Triggers a BUILD job on the Amplify app to pull the latest code from GitHub
# and rebuild the frontend, then forces a CloudFront /* invalidation.
# Use this when a code change needs to be deployed to the Amplify-hosted frontend
# (since enableAutoBuild is false on the branch).
#
# After this job succeeds, the custom domain ee-toolbox.synapsis-analytics.com
# will serve the freshly-built JS/CSS assets.

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  AMPLIFY_APP_ID: d15pb16eb2gi8i
  AMPLIFY_BRANCH: main

jobs:
  rebuild:
    name: Trigger Amplify RELEASE build
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC → MGMT)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::919959486181:role/cicd/github-actions-enabling-environment-toolbox-MGMT-deploy
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Discover app and branch state (non-fatal)
        continue-on-error: true
        run: |
          echo "=== Amplify app ==="
          aws amplify get-app \
            --app-id "$AMPLIFY_APP_ID" \
            --query 'app.{name:name,repository:repository,defaultDomain:defaultDomain}' \
            --output json || echo "(get-app failed)"
          echo ""
          echo "=== Branches ==="
          aws amplify list-branches \
            --app-id "$AMPLIFY_APP_ID" \
            --query 'branches[].{branch:branchName,enableAutoBuild:enableAutoBuild,totalJobs:totalNumberOfJobs}' \
            --output json || echo "(list-branches failed)"
          echo ""
          echo "=== Recent jobs ==="
          aws amplify list-jobs \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$AMPLIFY_BRANCH" \
            --max-items 3 \
            --query 'jobSummaries[].{jobId:jobId,status:status,commitId:commitId}' \
            --output json || echo "(list-jobs failed)"

      - name: Start BUILD job (pull latest code from GitHub + rebuild)
        id: start-build
        run: |
          JOB_ID=$(aws amplify start-job \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$AMPLIFY_BRANCH" \
            --job-type BUILD \
            --query 'jobSummary.jobId' --output text)
          echo "Started BUILD job: $JOB_ID"
          echo "JOB_ID=$JOB_ID" >> "$GITHUB_ENV"

      - name: Poll until build completes (max 30 minutes)
        run: |
          for i in $(seq 1 180); do
            STATUS=$(aws amplify get-job \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$AMPLIFY_BRANCH" \
              --job-id "$JOB_ID" \
              --query 'job.summary.status' --output text 2>/dev/null || echo "PENDING")
            echo "  Poll $i/120: $STATUS"
            if [ "$STATUS" = "SUCCEED" ]; then
              echo "Build $JOB_ID succeeded — CloudFront cache has been invalidated."
              exit 0
            fi
            if [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "::error::Build $JOB_ID ended with status $STATUS"
              aws amplify get-job \
                --app-id "$AMPLIFY_APP_ID" \
                --branch-name "$AMPLIFY_BRANCH" \
                --job-id "$JOB_ID" \
                --query 'job.steps[].{step:stepName,status:status}' --output table || true
              exit 1
            fi
            sleep 10
          done
          echo "::error::Timed out waiting for build $JOB_ID after 30 minutes"
          exit 1

      - name: Verify asset content-type on custom domain
        run: |
          echo "Waiting 30s for CloudFront to propagate invalidation..."
          sleep 30
          ASSET_PATH="/assets/index-B5Ik3aC2.js"
          echo "Testing: https://ee-toolbox.synapsis-analytics.com$ASSET_PATH"
          CONTENT_TYPE=$(curl -sI "https://ee-toolbox.synapsis-analytics.com$ASSET_PATH" \
            | grep -i 'content-type:' | head -1)
          echo "Content-Type: $CONTENT_TYPE"
          if echo "$CONTENT_TYPE" | grep -qi 'javascript\|application/'; then
            echo "Assets now served with correct content-type"
          else
            echo "Content-type may still be wrong: $CONTENT_TYPE (CloudFront propagation may need a few more minutes)"
          fi
